name: Test Project 
on: push 
jobs : 
  test : 
    runs-on: ubuntu-latest 
    steps:
      - name: Get Code 
        uses: actions/checkout@v6
      - name: Get Code 
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Dependencies  
        run: npm ci   #npm install 
      - name: Run Test 
        run: npm test        
  deploy : 
    needs: test # basically ab ye tabhi execute ho jayega jab 'test' job execute ho jayega agr vo execute nhi hua toh (sequential execution )   agr ye nhi hota toh parellel execution hoga .
    runs-on: ubuntu-latest 
    steps:
      - name: Get Code 
        uses: actions/checkout@v6
      - name: Get Code 
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Dependencies  
        run: npm ci   #npm install 
      - name: Build the Project 
        run: npm run build 
      - name: Deploy 
        run: echo "basically site ki link dalni hoti hai " 
        
        

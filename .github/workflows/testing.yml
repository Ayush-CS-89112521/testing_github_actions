name: Test Project 
on: push 
jobs : 
  test : 
    runs-on: ubuntu-latest 
    steps:
      - name: Get Code 
        uses: actions/checkout@v6
      - name: Get Code 
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Dependencies  
        run: npm ci   #npm install 
      - name: Run Test 
        run: npm test        
